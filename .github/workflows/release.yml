name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            args: "--bundles deb,appimage"
          - os: windows-latest
            args: "--bundles nsis,msi"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
        working-directory: app
      - name: Validate release tag
        run: node -e "const v=require('./app/src-tauri/tauri.conf.json').version; if(process.env.GITHUB_REF_NAME !== 'v'+v){throw new Error('Tag must equal v'+v)}"
      - run: npm run typecheck
        working-directory: app
      - run: npm test -- --run
        working-directory: app
      - run: cargo test --manifest-path app/src-tauri/Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "AirDrop ${{ github.ref_name }}"
          releaseBody: "Windows and Linux release builds with signed in-app update metadata. Device synchronization remains local-network only."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
